    <title>Mesai Takip Uygulaması</title>

    <!-- Dark Mode Initial State Script -->
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
            // Theme color for dark mode (corresponds to dark-bg / gray-900)
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#000000');
          } else {
            document.documentElement.classList.remove('dark');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#3B82F6');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Android navigasyon çubuğu için CSS değişkenleri -->
    <style>
      :root {
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* Sayfa ilk açılışında arka plan rengini belirle (parlamayı önlemek için) */
      html {
        background-color: #f3f4f6; /* bg-gray-100 equivalent */
      }
      
      html.dark {
        background-color: #000000; /* bg-black equivalent */
      }

      /* iOS için viewport yüksekliği düzeltmesi */
      @supports (-webkit-touch-callout: none) {
        .ios-fix {
          height: -webkit-fill-available;
        }
      }
    </style>
